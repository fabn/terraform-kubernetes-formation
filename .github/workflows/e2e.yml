name: E2E Tests

on:
  # Docs and examples never exercise the E2E harness (examples aren't run here,
  # and fmt/validate cover them in the other workflows), so skip the heavy Kind
  # suite when a change touches only those.
  pull_request:
    paths-ignore: ['**.md', 'examples/**']
  push:
    branches: [main]
    paths-ignore: ['**.md', 'examples/**']
  schedule:
    # Run every Monday at 8:00 UTC to verify E2E tests remain valid over time
    - cron: '0 8 * * 1'

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Bitnami chart deploys (postgres) pull sizeable images on a cold Kind node
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: kind
          config: .github/kind-config.yml

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform -chdir=e2e init

      - name: Terraform Test
        run: terraform -chdir=e2e test
