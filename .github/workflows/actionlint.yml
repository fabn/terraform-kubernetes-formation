name: Lint Actions

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**.*'
  pull_request:
    paths:
      - '.github/workflows/**.*'

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-check' || 'github-check' }}
          fail_level: any
